<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
  color:white;
  overflow:hidden;
}

/* 🎨 BACKGROUND */
#bg {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-2;
  transition:1s;
}

/* ☁️ CLOUDS / RAIN CANVAS */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* UI */
.container {
  padding:20px;
}

.city {
  text-align:center;
  opacity:.8;
  font-size:18px;
}

.temp {
  text-align:center;
  font-size:92px;
  font-weight:200;
}

.desc {
  text-align:center;
  opacity:.85;
}

.card {
  background:rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}

.hourly {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.hour {
  min-width:70px;
  text-align:center;
  background:rgba(255,255,255,0.08);
  padding:8px;
  border-radius:12px;
  font-size:13px;
}

button {
  width:100%;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  background:white;
}
</style>
</head>

<body>

<div id="bg"></div>
<canvas id="rain"></canvas>

<div class="container">

<div class="city" id="city">📍 Loading...</div>
<div class="temp" id="temp">--°</div>
<div class="desc" id="desc">...</div>

<button onclick="load()">🔄 Refresh</button>

<div class="card">
  <div class="row"><span>🌡 Feels</span><span id="feel">--°</span></div>
  <div class="row"><span>💨 Wind</span><span id="wind">--</span></div>
</div>

<div class="card">
  <div>⏱ Hourly</div>
  <div class="hourly" id="hourly"></div>
</div>

</div>

<script>
const tg=window.Telegram.WebApp;
tg.expand();

/* 🌧 RAIN ANIMATION */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let drops=[];

function createRain(){
drops=[];
for(let i=0;i<120;i++){
drops.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
l:Math.random()*20,
s:Math.random()*5+2
});
}
}

function drawRain(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle="rgba(255,255,255,0.3)";
ctx.lineWidth=1;

for(let d of drops){
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l);
ctx.stroke();

d.y+=d.s;
if(d.y>canvas.height){
d.y=-20;
d.x=Math.random()*canvas.width;
}
}

requestAnimationFrame(drawRain);
}

/* 🎨 BACKGROUND */
function setBg(temp){
if(temp<0){
document.getElementById("bg").style.background="linear-gradient(180deg,#0f2027,#203a43)";
createRain();
}
else if(temp<15){
document.getElementById("bg").style.background="linear-gradient(180deg,#2c3e50,#3498db)";
createRain();
}
else{
document.getElementById("bg").style.background="linear-gradient(180deg,#f12711,#f5af19)";
}
}

/* 🧠 ADVICE */
function advice(t){
if(t<0) return "🧊 Extreme cold";
if(t<10) return "🧥 Jacket needed";
if(t<20) return "👕 Light jacket";
return "☀️ Warm";
}

/* 🌤 LOAD */
async function load(){

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m`;

const r=await fetch(url);
const d=await r.json();

const w=d.current_weather;

const t=Math.round(w.temperature);

document.getElementById("temp").innerText=t+"°";
document.getElementById("feel").innerText=t+"°";
document.getElementById("wind").innerText=w.windspeed+" km/h";

document.getElementById("desc").innerText=advice(t);

setBg(t);

/* hourly */
let h=document.getElementById("hourly");
h.innerHTML="";
for(let i=0;i<12;i++){
h.innerHTML+=`<div class="hour">${i}:00<br><b>${Math.round(d.hourly.temperature_2m[i])}°</b></div>`;
}

document.getElementById("city").innerText="📍 Your location";

/* rain start */
drawRain();

});

}

load();
</script>

</body>
</html>
