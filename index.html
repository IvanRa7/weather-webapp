<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Weather</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
transition:1s;
}

/* ===== BACKGROUND ===== */
#bg{
position:fixed;
inset:0;
z-index:0;
transition:1s;
}

/* ===== FX LAYER ===== */
#fx{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* ===== TIME (FIXED FRONT) ===== */
#time{
position:fixed;
top:10px;
left:15px;
z-index:100;
font-size:16px;
font-weight:600;
padding:6px 10px;
border-radius:10px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

/* ===== UI ===== */
.ui{
position:relative;
z-index:10;
height:100vh;
overflow-y:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
margin-bottom:12px;
}

.city{font-size:26px;font-weight:600}
.temp{font-size:60px;font-weight:200}
.small{opacity:.7}

/* WEEK */
.week{
display:flex;
gap:10px;
overflow-x:auto;
}

.day{
min-width:80px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:12px;
text-align:center;
}

/* FX */
.cloud,.drop,.snow{
position:absolute;
pointer-events:none;
}

.cloud{
width:160px;
height:50px;
background:rgba(255,255,255,0.15);
border-radius:50px;
animation:move 40s linear infinite;
}

@keyframes move{
from{transform:translateX(-200px)}
to{transform:translateX(120vw)}
}

.drop{
width:2px;
height:20px;
background:rgba(255,255,255,0.4);
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh)}
}

.snow{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:snow linear infinite;
}

@keyframes snow{
to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="fx"></div>

<div id="time">--:--</div>

<div class="ui">

<div class="card">
<div class="city" id="city">Loading...</div>
<div class="temp" id="temp">--°</div>
<div class="small" id="desc">--</div>
<div id="advice"></div>
</div>

<div class="card">
📆 7-Day Forecast
<div class="week" id="week"></div>
</div>

</div>

<script>
const fx=document.getElementById("fx");

/* ===== CLOCK ===== */
function updateTime(){
const now=new Date();
document.getElementById("time").innerText=
now.toLocaleTimeString().slice(0,5);
}
setInterval(updateTime,1000);
updateTime();

/* ===== DAY / NIGHT THEME ===== */
function setTheme(){
const hour=new Date().getHours();

if(hour>=7 && hour<=18){
document.body.style.color="black";
document.getElementById("bg").style.background=
"linear-gradient(180deg,#7ec8ff,#eaf6ff)";
}else{
document.body.style.color="white";
document.getElementById("bg").style.background=
"linear-gradient(180deg,#0b1220,#1b2a4a)";
}
}
setTheme();

/* ===== FX ===== */
function clearFX(){fx.innerHTML=""}

function clouds(){
for(let i=0;i<4;i++){
let c=document.createElement("div");
c.className="cloud";
c.style.top=Math.random()*40+"vh";
c.style.animationDuration=(25+Math.random()*20)+"s";
fx.appendChild(c);
}
}

function rain(){
for(let i=0;i<80;i++){
let d=document.createElement("div");
d.className="drop";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(0.5+Math.random())+"s";
fx.appendChild(d);
}
}

function snow(){
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="snow";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(3+Math.random()*4)+"s";
fx.appendChild(s);
}
}

/* ===== ADVICE ===== */
function advice(t,w){
let r="🧠 Одежда: ";
if(t<0)r+="🧥 очень тепло";
else if(t<10)r+="🧥 куртка";
else if(t<20)r+="👕 лёгкая";
else r+="☀️ жарко";

if(w>30)r+=" 🌬 ветрено";
return r;
}

/* ===== WEATHER ===== */
navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

/* city */
const city=await fetch(
`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`
).then(r=>r.json());

/* weather */
const w=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
).then(r=>r.json());

document.getElementById("city").innerText=
city.city||"Unknown";

document.getElementById("temp").innerText=
Math.round(w.current_weather.temperature)+"°";

document.getElementById("desc").innerText=
"Wind "+w.current_weather.windspeed+" km/h";

document.getElementById("advice").innerText=
advice(
w.current_weather.temperature,
w.current_weather.windspeed
);

/* WEEK */
const week=document.getElementById("week");
week.innerHTML="";

for(let i=0;i<7;i++){
let d=document.createElement("div");
d.className="day";
d.innerHTML=`
<div>${w.daily.time[i].slice(5)}</div>
<div>${Math.round(w.daily.temperature_2m_min[i])}°</div>
<div>${Math.round(w.daily.temperature_2m_max[i])}°</div>
`;
week.appendChild(d);
}

/* FX */
clearFX();

const code=w.current_weather.weathercode;

if(code<=2)clouds();
else if(code>=51 && code<=67)rain();
else if(code>=71 && code<=77)snow();

});
</script>

</body>
</html>
