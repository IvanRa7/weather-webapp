<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Weather App</title>

<style>
/* ================= BASE ================= */
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
    overflow:hidden;
    background:#0b1220;
}

/* ================= BACKGROUND ================= */
#bg {
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-3;
    background: linear-gradient(180deg,#1b2a4a,#0b1220);
    transition: all 1.5s ease;
}

/* moving clouds */
.cloud {
    position:absolute;
    width:200px;
    height:60px;
    background:rgba(255,255,255,0.15);
    border-radius:50px;
    filter:blur(1px);
    animation: moveClouds linear infinite;
}

.cloud:before,
.cloud:after {
    content:"";
    position:absolute;
    background:rgba(255,255,255,0.15);
    border-radius:50px;
}

.cloud:before {
    width:120px;
    height:120px;
    top:-50px;
    left:20px;
}

.cloud:after {
    width:100px;
    height:100px;
    top:-30px;
    left:90px;
}

@keyframes moveClouds {
    from { transform: translateX(-300px); }
    to { transform: translateX(120vw); }
}

/* rain */
.drop {
    position:absolute;
    width:2px;
    height:20px;
    background:rgba(255,255,255,0.4);
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

/* snow */
.snow {
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.7;
    animation: snowFall linear infinite;
}

@keyframes snowFall {
    to { transform: translateY(100vh) rotate(360deg); }
}

/* ================= UI ================= */
.container {
    padding:20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    backdrop-filter: blur(15px);
    margin-top:15px;
}

.city {
    font-size:28px;
    font-weight:600;
}

.temp {
    font-size:64px;
    font-weight:200;
}

.small {
    opacity:0.7;
}

.week {
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.day {
    min-width:80px;
    background: rgba(255,255,255,0.06);
    padding:10px;
    border-radius:12px;
    text-align:center;
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="container">

    <div class="card">
        <div class="city" id="city">Loading...</div>
        <div class="temp" id="temp">--°</div>
        <div class="small" id="desc">--</div>
    </div>

    <div class="card">
        <div>📆 Forecast</div>
        <div class="week" id="week"></div>
    </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* ================= GEO ================= */
async function getCity(lat, lon){
    const r = await fetch(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`
    );
    const d = await r.json();
    return d.city || d.locality || "Unknown";
}

/* ================= WEATHER ================= */
async function getWeather(lat, lon){
    const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
    );
    return await r.json();
}

/* ================= BACKGROUND CONTROL ================= */
function clearEffects(){
    document.querySelectorAll(".drop,.snow,.cloud").forEach(e=>e.remove());
}

/* CLOUDS */
function addClouds(){
    for(let i=0;i<5;i++){
        let c=document.createElement("div");
        c.className="cloud";
        c.style.top=Math.random()*50+"vh";
        c.style.animationDuration=(20+Math.random()*40)+"s";
        document.body.appendChild(c);
    }
}

/* RAIN */
function rain(){
    for(let i=0;i<120;i++){
        let d=document.createElement("div");
        d.className="drop";
        d.style.left=Math.random()*100+"vw";
        d.style.animationDuration=(0.5+Math.random())+"s";
        document.body.appendChild(d);
    }
}

/* SNOW */
function snow(){
    for(let i=0;i<80;i++){
        let s=document.createElement("div");
        s.className="snow";
        s.style.left=Math.random()*100+"vw";
        s.style.animationDuration=(3+Math.random()*5)+"s";
        document.body.appendChild(s);
    }
}

/* ================= WEATHER MAP ================= */
function setBackground(code){

    clearEffects();

    const bg = document.getElementById("bg");

    // clear
    bg.style.background = "";

    if(code <= 2){
        bg.style.background = "linear-gradient(180deg,#4facfe,#0b1220)";
        addClouds();
    }
    else if(code >= 51 && code <= 67){
        bg.style.background = "linear-gradient(180deg,#3a7bd5,#000428)";
        rain();
    }
    else if(code >= 71 && code <= 77){
        bg.style.background = "linear-gradient(180deg,#e6dada,#274046)";
        snow();
    }
    else{
        bg.style.background = "linear-gradient(180deg,#1b2a4a,#0b1220)";
        addClouds();
    }
}

/* ================= LOAD ================= */
async function init(){

    navigator.geolocation.getCurrentPosition(async (pos)=>{

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        const city = await getCity(lat,lon);
        const w = await getWeather(lat,lon);

        document.getElementById("city").innerText = city;
        document.getElementById("temp").innerText =
            Math.round(w.current_weather.temperature)+"°";

        document.getElementById("desc").innerText =
            "Wind " + w.current_weather.windspeed + " km/h";

        setBackground(w.current_weather.weathercode);

        /* week */
        let week=document.getElementById("week");
        week.innerHTML="";

        for(let i=0;i<w.daily.time.length;i++){
            let d=document.createElement("div");
            d.className="day";
            d.innerHTML=
            `<div>${w.daily.time[i].slice(5)}</div>
             <div>${Math.round(w.daily.temperature_2m_min[i])}°</div>
             <div>${Math.round(w.daily.temperature_2m_max[i])}°</div>`;
            week.appendChild(d);
        }

    });
}

init();
</script>

</body>
</html>
