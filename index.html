<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Weather App</title>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color:white;
    background: linear-gradient(180deg,#0b1220,#0f1a33);
    overflow:hidden;
}

/* ====== BACKGROUND WEATHER ====== */
#weather-bg {
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

/* ====== UI ====== */
.container {
    padding:20px;
}

.card {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-top:15px;
    backdrop-filter: blur(10px);
}

.city {
    font-size:28px;
    font-weight:600;
}

.temp {
    font-size:64px;
    font-weight:200;
}

.small {
    opacity:0.7;
}

/* ====== WEEK ====== */
.week {
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.day {
    min-width:80px;
    text-align:center;
    background: rgba(255,255,255,0.06);
    padding:10px;
    border-radius:12px;
}

/* ====== RAIN ====== */
.drop {
    position:absolute;
    width:2px;
    height:20px;
    background:rgba(255,255,255,0.4);
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<canvas id="weather-bg"></canvas>

<div class="container">

    <div class="card">
        <div class="city" id="city">Loading...</div>
        <div class="temp" id="temp">--°</div>
        <div class="small" id="desc">--</div>
    </div>

    <div class="card">
        <div>📆 7-Day Forecast</div>
        <div class="week" id="week"></div>
    </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* ================== GEO CACHE ================== */
let lastPos = JSON.parse(localStorage.getItem("lastPos") || "null");

/* distance calc */
function distance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)*Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* ================== GEO ================== */
async function getCity(lat, lon){
    const r = await fetch(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`
    );
    const d = await r.json();
    return d.city || d.locality || "Unknown";
}

/* ================== WEATHER ================== */
async function getWeather(lat, lon){
    const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
    );
    return await r.json();
}

/* ================== INIT LOCATION ================== */
async function init(){

    if(!navigator.geolocation){
        alert("No GPS");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (pos)=>{

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        /* check movement (>2km update) */
        if(lastPos){
            const dist = distance(lastPos.lat,lastPos.lon,lat,lon);
            if(dist < 2){
                load(lastPos.lat,lastPos.lon);
                return;
            }
        }

        localStorage.setItem("lastPos", JSON.stringify({lat,lon}));

        load(lat,lon);

    });
}

/* ================== LOAD DATA ================== */
async function load(lat,lon){

    const city = await getCity(lat,lon);
    const w = await getWeather(lat,lon);

    document.getElementById("city").innerText = city;
    document.getElementById("temp").innerText =
        Math.round(w.current_weather.temperature) + "°";

    document.getElementById("desc").innerText =
        "Wind " + w.current_weather.windspeed + " km/h";

    /* WEEK */
    const week = document.getElementById("week");
    week.innerHTML = "";

    for(let i=0;i<w.daily.time.length;i++){

        const div = document.createElement("div");
        div.className = "day";
        div.innerHTML =
            `<div>${w.daily.time[i].slice(5)}</div>
             <div>${Math.round(w.daily.temperature_2m_min[i])}°</div>
             <div>${Math.round(w.daily.temperature_2m_max[i])}°</div>`;

        week.appendChild(div);
    }

    /* WEATHER EFFECT */
    startWeatherAnimation(w.current_weather.weathercode);
}

/* ================== WEATHER EFFECTS ================== */
function startWeatherAnimation(code){

    const canvas = document.getElementById("weather-bg");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let drops = [];

    function createRain(){
        drops = [];
        for(let i=0;i<100;i++){
            drops.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                l: Math.random()*20,
                s: Math.random()*5+2
            });
        }
    }

    function drawRain(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 1;

        for(let d of drops){
            ctx.beginPath();
            ctx.moveTo(d.x,d.y);
            ctx.lineTo(d.x,d.y+d.l);
            ctx.stroke();

            d.y += d.s;
            if(d.y > canvas.height){
                d.y = -20;
            }
        }

        requestAnimationFrame(drawRain);
    }

    /* weather logic */
    if(code >= 51 && code <= 67){
        createRain();
        drawRain();
    }
}

/* ================== AUTO UPDATE ================== */
setInterval(()=>{
    init();
}, 15 * 60 * 1000); // каждые 15 минут

init();
</script>

</body>
</html>
