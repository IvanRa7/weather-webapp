<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
      color: white;
      text-align: center;
      overflow-x: hidden;
      background: linear-gradient(180deg, #1e3c72, #2a5298);
    }

    .wrap {
      padding: 25px;
    }

    .city {
      font-size: 22px;
      opacity: 0.9;
      margin-top: 10px;
    }

    .temp {
      font-size: 80px;
      font-weight: 200;
      margin: 10px 0;
    }

    .desc {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 15px;
      margin: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      opacity: 0.9;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="wrap">
  <div class="city" id="city">📍 Определяем город...</div>

  <div class="temp" id="temp">--°</div>
  <div class="desc" id="desc">Загрузка...</div>

  <button onclick="loadWeather()">🔄 Обновить</button>

  <div class="card">
    <div class="row">
      <span>🌡 Ощущается</span>
      <span id="feels">--°</span>
    </div>
    <div class="row">
      <span>🌬 Ветер</span>
      <span id="wind">-- км/ч</span>
    </div>
  </div>

  <div class="card">
    <div id="advice">🧠 Рекомендации загружаются...</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function getAdvice(temp, wind) {
  if (temp < 0) return "🧊 Очень холодно — зимняя одежда";
  if (temp < 10) return "🧥 Холодно — куртка обязательна";
  if (temp < 20) return "👕 Лёгкая куртка";
  if (temp >= 20) return "☀️ Тепло — лёгкая одежда";
  if (wind > 30) return "🌬 Ветрено — оденься теплее";
  return "👍 Комфортная погода";
}

async function loadWeather() {

  document.getElementById("desc").innerText = "Получаем данные...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    // Open-Meteo API
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

    const res = await fetch(url);
    const data = await res.json();

    const w = data.current_weather;

    const temp = Math.round(w.temperature);
    const wind = Math.round(w.windspeed);

    document.getElementById("temp").innerText = temp + "°";
    document.getElementById("feels").innerText = temp + "°";
    document.getElementById("wind").innerText = wind + " км/ч";

    document.getElementById("desc").innerText = "Сейчас на улице";

    document.getElementById("advice").innerText = getAdvice(temp, wind);

    document.getElementById("city").innerText = "📍 Ваше местоположение";

  });

}
</script>

</body>
</html>
