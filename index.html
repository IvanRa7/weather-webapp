<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Weather</title>

<style>
html, body {
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
}

/* ===== ROOT LAYERS ===== */
#bg {
    position:fixed;
    inset:0;
    z-index:0;
    background: linear-gradient(180deg,#1b2a4a,#0b1220);
}

/* ===== WEATHER LAYER (IMPORTANT FIX) ===== */
#weather-layer {
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none; /* 🔥 важно */
}

/* clouds / rain / snow inside layer */
.cloud, .drop, .snow {
    position:absolute;
    pointer-events:none;
}

/* ===== UI LAYER ===== */
.container {
    position:relative;
    z-index:10;
    height:100vh;
    overflow-y:auto;     /* 🔥 СКРОЛЛ ТОЛЬКО ЗДЕСЬ */
    -webkit-overflow-scrolling:touch;
    padding:20px;
    box-sizing:border-box;
}

/* ===== CARDS ===== */
.card {
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    backdrop-filter: blur(15px);
    margin-bottom:15px;
}

.city { font-size:28px; font-weight:600; }
.temp { font-size:64px; font-weight:200; }
.small { opacity:0.7; }

/* WEEK SCROLL FIX */
.week {
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.day {
    min-width:80px;
    background: rgba(255,255,255,0.06);
    padding:10px;
    border-radius:12px;
    text-align:center;
}

/* ===== ANIMATIONS ===== */
.cloud {
    width:180px;
    height:60px;
    background:rgba(255,255,255,0.15);
    border-radius:50px;
    animation: move 40s linear infinite;
}

@keyframes move {
    from { transform: translateX(-200px); }
    to { transform: translateX(120vw); }
}

.drop {
    width:2px;
    height:18px;
    background:rgba(255,255,255,0.4);
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}

.snow {
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation: snow linear infinite;
}

@keyframes snow {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="weather-layer"></div>

<div class="container">

    <div class="card">
        <div class="city" id="city">Loading...</div>
        <div class="temp" id="temp">--°</div>
        <div class="small" id="desc">--</div>
    </div>

    <div class="card">
        <div>📆 7-Day Forecast</div>
        <div class="week" id="week"></div>
    </div>

</div>

<script>
const layer = document.getElementById("weather-layer");

/* ===== CLEAN ===== */
function clearFX(){
    layer.innerHTML="";
}

/* ===== FX ===== */
function clouds(){
    for(let i=0;i<4;i++){
        let c=document.createElement("div");
        c.className="cloud";
        c.style.top=Math.random()*40+"vh";
        c.style.left="-200px";
        c.style.animationDuration=(30+Math.random()*20)+"s";
        layer.appendChild(c);
    }
}

function rain(){
    for(let i=0;i<80;i++){
        let d=document.createElement("div");
        d.className="drop";
        d.style.left=Math.random()*100+"vw";
        d.style.animationDuration=(0.5+Math.random())+"s";
        layer.appendChild(d);
    }
}

function snow(){
    for(let i=0;i<60;i++){
        let s=document.createElement("div");
        s.className="snow";
        s.style.left=Math.random()*100+"vw";
        s.style.animationDuration=(3+Math.random()*4)+"s";
        layer.appendChild(s);
    }
}

/* ===== WEATHER BG ===== */
function setWeather(code){

    clearFX();

    if(code<=2){
        document.getElementById("bg").style.background =
            "linear-gradient(180deg,#4facfe,#0b1220)";
        clouds();
    }
    else if(code>=51 && code<=67){
        document.getElementById("bg").style.background =
            "linear-gradient(180deg,#3a7bd5,#000428)";
        rain();
    }
    else if(code>=71 && code<=77){
        document.getElementById("bg").style.background =
            "linear-gradient(180deg,#e6dada,#274046)";
        snow();
    }
}

/* ===== GEO ===== */
navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const cityRes=await fetch(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ru`
    );
    const cityData=await cityRes.json();

    const wRes=await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
    );
    const w=await wRes.json();

    document.getElementById("city").innerText =
        cityData.city || "Unknown";

    document.getElementById("temp").innerText =
        Math.round(w.current_weather.temperature)+"°";

    document.getElementById("desc").innerText =
        "Wind "+w.current_weather.windspeed+" km/h";

    setWeather(w.current_weather.weathercode);

    const week=document.getElementById("week");
    week.innerHTML="";

    for(let i=0;i<w.daily.time.length;i++){
        let d=document.createElement("div");
        d.className="day";
        d.innerHTML=`
            <div>${w.daily.time[i].slice(5)}</div>
            <div>${Math.round(w.daily.temperature_2m_min[i])}°</div>
            <div>${Math.round(w.daily.temperature_2m_max[i])}°</div>
        `;
        week.appendChild(d);
    }

});
</script>

</body>
</html>
