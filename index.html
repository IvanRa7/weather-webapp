<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
color:white;
background:#000;
overflow:hidden;
}

/* SCROLL FIX */
.scroll{
height:100vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
position:relative;
padding-bottom:100px;
}

/* BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
z-index:-5;
transition:1s;
}

/* CANVAS */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* UI */
.container{padding:22px;}

.city{text-align:center;opacity:.8;font-size:18px;}

.temp{
text-align:center;
font-size:110px;
font-weight:200;
}

.desc{text-align:center;opacity:.8}

/* CARDS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:14px;
margin-top:12px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
}

/* hourly */
.hourly{
display:flex;
overflow-x:auto;
gap:10px;
}

.hour{
min-width:70px;
text-align:center;
padding:10px;
border-radius:14px;
background:rgba(255,255,255,0.08);
}

/* daily */
.day{
display:flex;
justify-content:space-between;
padding:10px;
background:rgba(255,255,255,0.06);
margin-top:6px;
border-radius:12px;
}
</style>
</head>

<body>

<div id="bg"></div>

<canvas id="fx"></canvas>
<canvas id="stars"></canvas>
<canvas id="clouds"></canvas>

<div class="scroll">

<div class="container">

<div class="city" id="city">📍 loading...</div>
<div class="temp" id="temp">--°</div>
<div class="desc" id="desc">...</div>

<div class="card">
<div class="row"><span>🌡 feels</span><span id="feel"></span></div>
<div class="row"><span>💨 wind</span><span id="wind"></span></div>
</div>

<div class="card">
<div>📊 hourly</div>
<div class="hourly" id="hourly"></div>
</div>

<div class="card">
<div>📆 week</div>
<div id="daily"></div>
</div>

</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* ================= CITY ================= */
async function getCity(lat, lon){
try{
const r = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ru`);
const d = await r.json();
return d?.results?.[0]?.name || "Unknown";
}catch{return "Unknown";}
}

/* ================= CLOUDS ================= */
const c = document.getElementById("clouds");
const cx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let clouds=[];

function initClouds(){
clouds=[];
for(let i=0;i<15;i++){
clouds.push({
x:Math.random()*c.width,
y:Math.random()*c.height*0.5,
w:120+Math.random()*200,
h:60+Math.random()*40,
s:0.3+Math.random()*0.5
});
}
}

function drawClouds(){
cx.clearRect(0,0,c.width,c.height);

for(let cl of clouds){
cx.fillStyle="rgba(255,255,255,0.07)";
cx.beginPath();
cx.ellipse(cl.x,cl.y,cl.w,cl.h,0,0,Math.PI*2);
cx.fill();

cl.x += cl.s;

if(cl.x > c.width+200){
cl.x = -200;
cl.y = Math.random()*c.height*0.5;
}
}

requestAnimationFrame(drawClouds);
}

initClouds();
drawClouds();

/* ================= STARS ================= */
const s=document.getElementById("stars");
const sx=s.getContext("2d");
s.width=innerWidth;
s.height=innerHeight;

let stars=[];

function initStars(){
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*s.width,
y:Math.random()*s.height,
r:Math.random()*1.5
});
}
}

function drawStars(){
sx.clearRect(0,0,s.width,s.height);
for(let st of stars){
sx.beginPath();
sx.arc(st.x,st.y,st.r,0,Math.PI*2);
sx.fillStyle="white";
sx.fill();
}
requestAnimationFrame(drawStars);
}

initStars();
drawStars();

/* ================= WEATHER ================= */
async function load(){

navigator.geolocation.getCurrentPosition(async(p)=>{

const lat=p.coords.latitude;
const lon=p.coords.longitude;

const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7`);

const d=await r.json();
const w=d.current_weather;

const t=Math.round(w.temperature);

document.getElementById("temp").innerText=t+"°";
document.getElementById("feel").innerText=t+"°";
document.getElementById("wind").innerText=w.windspeed+" km/h";

document.getElementById("city").innerText="📍 "+await getCity(lat,lon);

/* hourly */
let h=document.getElementById("hourly");
h.innerHTML="";
for(let i=0;i<10;i++){
h.innerHTML+=`<div class="hour">${Math.round(d.hourly.temperature_2m[i])}°</div>`;
}

/* daily */
let dd=document.getElementById("daily");
dd.innerHTML="";
for(let i=0;i<7;i++){
dd.innerHTML+=`
<div class="day">
<span>Day ${i+1}</span>
<span>${d.daily.temperature_2m_min[i]}° / ${d.daily.temperature_2m_max[i]}°</span>
</div>`;
}

});
}

load();
</script>

</body>
</html>
