<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;
      color: white;
      background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
    }

    .city {
      text-align: center;
      font-size: 18px;
      opacity: 0.85;
      margin-top: 10px;
    }

    .temp {
      text-align: center;
      font-size: 92px;
      font-weight: 200;
      margin: 10px 0;
    }

    .status {
      text-align: center;
      font-size: 16px;
      opacity: 0.8;
    }

    .card {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 15px;
      margin-top: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .forecast {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px 0;
    }

    .hour {
      min-width: 70px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: white;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="city" id="city">📍 Определение...</div>

  <div class="temp" id="temp">--°</div>
  <div class="status" id="status">Загрузка погоды...</div>

  <button onclick="loadWeather()">🔄 Обновить</button>

  <div class="card">
    <div class="row">
      <span>🌡 Ощущается</span>
      <span id="feels">--°</span>
    </div>
    <div class="row">
      <span>🌬 Ветер</span>
      <span id="wind">-- км/ч</span>
    </div>
    <div class="row">
      <span>💧 Влажность</span>
      <span id="hum">--%</span>
    </div>
  </div>

  <div class="card">
    <div>⏱ Почасовой прогноз</div>
    <div class="forecast" id="forecast"></div>
  </div>

  <div class="card">
    <div id="advice">🧠 Рекомендация загружается...</div>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function getAdvice(temp) {
  if (temp < 0) return "🧊 Очень холодно — зимняя одежда";
  if (temp < 10) return "🧥 Холодно — куртка нужна";
  if (temp < 20) return "👕 Лёгкая куртка";
  return "☀️ Тёплая погода";
}

async function loadWeather() {

  document.getElementById("status").innerText = "Определяем геолокацию...";

  navigator.geolocation.getCurrentPosition(async (pos) => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m&forecast_days=1`;

    const res = await fetch(url);
    const data = await res.json();

    const w = data.current_weather;

    const temp = Math.round(w.temperature);
    const wind = Math.round(windspeed = w.windspeed);

    document.getElementById("temp").innerText = temp + "°";
    document.getElementById("feels").innerText = temp + "°";
    document.getElementById("wind").innerText = wind + " км/ч";
    document.getElementById("hum").innerText = "—";

    document.getElementById("status").innerText = "Сейчас";

    document.getElementById("advice").innerText = getAdvice(temp);

    // Почасовой прогноз (упрощённый)
    const forecast = document.getElementById("forecast");
    forecast.innerHTML = "";

    for (let i = 0; i < 12; i++) {
      const t = data.hourly.temperature_2m[i];

      const div = document.createElement("div");
      div.className = "hour";
      div.innerHTML = `${i}:00<br><b>${Math.round(t)}°</b>`;
      forecast.appendChild(div);
    }

    document.getElementById("city").innerText = "📍 Ваш регион";

  });

}

loadWeather();
</script>

</body>
</html>
