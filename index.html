<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
color:white;
overflow:hidden;
}

/* BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
z-index:-4;
transition:1s;
}

/* FX LAYERS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

/* UI */
.container{padding:22px;}

.city{text-align:center;opacity:.85;font-size:18px;}

.temp{
text-align:center;
font-size:108px;
font-weight:200;
letter-spacing:-2px;
}

.desc{text-align:center;opacity:.8}

/* GLASS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(22px);
border-radius:24px;
padding:14px;
margin-top:12px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
font-size:14px;
}

/* hourly */
.hourly{
display:flex;
overflow-x:auto;
gap:10px;
}

.hour{
min-width:72px;
text-align:center;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:14px;
}

/* chart */
canvas#chart{
width:100%;
height:140px;
}

/* daily */
.day{
display:flex;
justify-content:space-between;
padding:10px;
border-radius:14px;
background:rgba(255,255,255,0.06);
margin-top:6px;
}
</style>
</head>

<body>

<div id="bg"></div>

<canvas id="fx"></canvas>
<canvas id="stars"></canvas>

<div class="container">

<div class="city" id="city">📍 locating...</div>
<div class="temp" id="temp">--°</div>
<div class="desc" id="desc">loading...</div>

<div class="card">
<div class="row"><span>🌡 feels</span><span id="feel">--°</span></div>
<div class="row"><span>💨 wind</span><span id="wind">--</span></div>
</div>

<div class="card">
<div>📊 temperature graph</div>
<canvas id="chart"></canvas>
</div>

<div class="card">
<div>⏱ hourly</div>
<div class="hourly" id="hourly"></div>
</div>

<div class="card">
<div>📆 7 days</div>
<div id="daily"></div>
</div>

</div>

<script>
const tg=window.Telegram.WebApp;
tg.expand();

/* ======================
🌍 REVERSE GEOCODING
====================== */
async function getCity(lat, lon){
  try{
    const r = await fetch(
      `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ru`
    );
    const d = await r.json();
    return d?.results?.[0]?.name || "Unknown";
  }catch(e){
    return "Unknown";
  }
}

/* ======================
🌧 FX (rain / snow)
====================== */
const fx=document.getElementById("fx");
const f=fx.getContext("2d");
fx.width=innerWidth;
fx.height=innerHeight;

let drops=[];

function rain(){
drops=[];
for(let i=0;i<100;i++){
drops.push({
x:Math.random()*fx.width,
y:Math.random()*fx.height,
l:Math.random()*18,
s:Math.random()*4+2
});
}
}

function drawFX(){
f.clearRect(0,0,fx.width,fx.height);

f.strokeStyle="rgba(255,255,255,0.25)";
for(let d of drops){
f.beginPath();
f.moveTo(d.x,d.y);
f.lineTo(d.x,d.y+d.l);
f.stroke();

d.y+=d.s;
if(d.y>fx.height){
d.y=0;
d.x=Math.random()*fx.width;
}
}

requestAnimationFrame(drawFX);
}

/* ======================
🌌 STARS (iOS night sky)
====================== */
const s=document.getElementById("stars");
const sx=s.getContext("2d");
s.width=innerWidth;
s.height=innerHeight;

let stars=[];

function createStars(){
stars=[];
for(let i=0;i<140;i++){
stars.push({
x:Math.random()*s.width,
y:Math.random()*s.height,
r:Math.random()*1.5,
o:Math.random()
});
}
}

function drawStars(){
sx.clearRect(0,0,s.width,s.height);

for(let st of stars){
sx.beginPath();
sx.arc(st.x,st.y,st.r,0,Math.PI*2);
sx.fillStyle=`rgba(255,255,255,${st.o})`;
sx.fill();
}

requestAnimationFrame(drawStars);
}

createStars();
drawStars();

/* 🌠 PARALLAX */
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*10;
let y=(e.clientY/window.innerHeight-0.5)*10;

s.style.transform=`translate(${x}px,${y}px)`;
});

/* ======================
⚡ LIGHTNING SYSTEM
====================== */
function lightning(){
document.getElementById("bg").style.filter="brightness(3)";
setTimeout(()=>{
document.getElementById("bg").style.filter="brightness(1)";
},120);
}

function stormCheck(t){
if(t>15){
setInterval(()=>{
if(Math.random()<0.25) lightning();
},3000);
}
}

/* ======================
🎨 BACKGROUND
====================== */
function bg(t){
let b=document.getElementById("bg");

if(t<0){
b.style.background="linear-gradient(180deg,#0b132b,#1c2541)";
rain();
}
else if(t<10){
b.style.background="linear-gradient(180deg,#1e3c72,#2a5298)";
rain();
}
else if(t<20){
b.style.background="linear-gradient(180deg,#2b5876,#4e4376)";
}
else{
b.style.background="linear-gradient(180deg,#f12711,#f5af19)";
}
}

/* ======================
📊 GRAPH
====================== */
function chart(data){
const c=document.getElementById("chart");
const g=c.getContext("2d");

c.width=innerWidth-50;
c.height=140;

g.clearRect(0,0,c.width,c.height);

let max=Math.max(...data);
let min=Math.min(...data);

g.strokeStyle="white";
g.lineWidth=3;
g.beginPath();

data.forEach((v,i)=>{
let x=i*(c.width/data.length);
let y=c.height-((v-min)/(max-min))*110;

if(i==0)g.moveTo(x,y);
else g.lineTo(x,y);
});

g.stroke();
}

/* ======================
🌤 MAIN LOAD
====================== */
async function load(){

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7`;

const r=await fetch(url);
const d=await r.json();

const w=d.current_weather;
const t=Math.round(w.temperature);

document.getElementById("temp").innerText=t+"°";
document.getElementById("feel").innerText=t+"°";
document.getElementById("wind").innerText=w.windspeed+" km/h";

bg(t);

const city = await getCity(lat,lon);
document.getElementById("city").innerText="📍 "+city;

stormCheck(t);

/* hourly */
let h=document.getElementById("hourly");
h.innerHTML="";
let arr=[];

for(let i=0;i<12;i++){
let v=Math.round(d.hourly.temperature_2m[i]);
arr.push(v);
h.innerHTML+=`<div class="hour">${i}:00<br><b>${v}°</b></div>`;
}

/* chart */
chart(arr);

/* daily */
let dd=document.getElementById("daily");
dd.innerHTML="";
for(let i=0;i<7;i++){
dd.innerHTML+=`
<div class="day">
<span>Day ${i+1}</span>
<span>${d.daily.temperature_2m_min[i]}° / ${d.daily.temperature_2m_max[i]}°</span>
</div>`;
}

drawFX();

});
}

load();
</script>

</body>
</html>
