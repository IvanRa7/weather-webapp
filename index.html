<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Arial;
color:white;
overflow:hidden;
}

/* BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
z-index:-5;
transition:1s;
}

/* SCROLL */
.scroll{
height:100vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
position:relative;
}

/* UI */
.container{padding:20px;}

.city{text-align:center;opacity:.8;font-size:18px;}
.temp{text-align:center;font-size:110px;font-weight:200;}
.desc{text-align:center;opacity:.8}

/* CARDS */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:18px;
padding:14px;
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
}

/* ANIMATED CLOUDS */
canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<div id="bg"></div>
<canvas id="clouds"></canvas>

<div class="scroll">
<div class="container">

<div class="city" id="city">📍 loading...</div>
<div class="temp" id="temp">--°</div>
<div class="desc" id="desc">...</div>

<div class="card">
<div class="row"><span>🌡 feels</span><span id="feel"></span></div>
<div class="row"><span>💨 wind</span><span id="wind"></span></div>
</div>

</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* ================= GEO STORAGE ================= */
const GEO_KEY="geo_v1";
const WEATHER_KEY="weather_v1";

/* ================= DISTANCE (KM) ================= */
function distance(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ================= REVERSE GEOCODING ================= */
async function getCity(lat,lon){
try{
const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
const d=await r.json();
return d.address.city || d.address.town || d.address.village || "Unknown";
}catch{
return "Unknown";
}
}

/* ================= WEATHER ================= */
async function getWeather(lat,lon){
const r=await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
);
return await r.json();
}

/* ================= BACKGROUND ================= */
function setBG(temp){
let bg=document.getElementById("bg");

if(temp<0) bg.style.background="linear-gradient(#0b132b,#1c2541)";
else if(temp<10) bg.style.background="linear-gradient(#1e3c72,#2a5298)";
else if(temp<20) bg.style.background="linear-gradient(#2b5876,#4e4376)";
else bg.style.background="linear-gradient(#f12711,#f5af19)";
}

/* ================= SMART LOCATION ================= */
async function update(){

navigator.geolocation.getCurrentPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

let saved=JSON.parse(localStorage.getItem(GEO_KEY)||"null");

if(saved){
let d=distance(lat,lon,saved.lat,saved.lon);
if(d<2){
console.log("📍 no significant movement");
return;
}
}

/* save new geo */
localStorage.setItem(GEO_KEY,JSON.stringify({lat,lon}));

/* weather */
let w=await getWeather(lat,lon);
let cur=w.current_weather;

/* city */
let city=await getCity(lat,lon);

/* UI */
document.getElementById("city").innerText="📍 "+city;
document.getElementById("temp").innerText=Math.round(cur.temperature)+"°";
document.getElementById("feel").innerText=Math.round(cur.temperature)+"°";
document.getElementById("wind").innerText=cur.windspeed+" km/h";

setBG(cur.temperature);

});
}

/* ================= AUTO UPDATE ================= */
update();
setInterval(update, 5*60*1000); // каждые 5 минут

</script>

</body>
</html>
